name: check

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: changed-file check
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false
    timeout-minutes: 12
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          components: rustfmt, clippy
          toolchain: "1.88"

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'xtask/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Cache xtask target dir
        uses: actions/cache@v4
        with:
          path: tmp/xtask-check-target
          key: xtask-check-target-${{ runner.os }}-${{ hashFiles('xtask/Cargo.lock') }}
          restore-keys: xtask-check-target-${{ runner.os }}-

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Check changed files
        run: just check-changed --base "$BASE_SHA"
