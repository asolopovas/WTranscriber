name: check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: just check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          components: rustfmt, clippy
          toolchain: "1.88"

      - name: Install Linux build deps (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev \
            librsvg2-dev libayatana-appindicator3-dev pkg-config

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock', 'xtask/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Cache target dir
        uses: actions/cache@v4
        with:
          path: |
            src-tauri/target
            xtask/target
          key: target-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: target-${{ runner.os }}-

      - name: Install JS deps
        run: bun install --frozen-lockfile

      - name: Install cargo-machete + cargo-audit
        run: |
          cargo install --locked cargo-machete cargo-audit

      - name: Pre-fetch crates (offline-friendly check)
        run: cargo fetch --manifest-path src-tauri/Cargo.toml

      - name: just check
        run: just check
