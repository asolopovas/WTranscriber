# cargo-audit configuration. Read automatically by `cargo audit`.
# Used by `just audit` and `just check` (audit job).
#
# Policy: every ignored advisory needs a rationale. Revisit on each
# `cargo update`. Drop entries the moment a fixed crate version reaches
# our dependency graph.

[advisories]
ignore = [
    # Bundled / transitive deps inside sherpa-onnx and ort. Not on any
    # attacker-reachable input path; upstream ships its own fix cadence.
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    "RUSTSEC-2024-0429",

    # Unmaintained crates pulled transitively. No replacement upstream yet.
    "RUSTSEC-2024-0370",
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0098",
    "RUSTSEC-2025-0100",
]

informational_warnings = ["unmaintained", "unsound"]
